worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_proxied    any;

    # ── Request size limit ────────────────────────────────────────────────────
    client_max_body_size 10m;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:5000;
        keepalive 32;
    }

    # ── Upstream failover — pass to next upstream on error, timeout, or 5xx ──
    # Only applies to HTTP requests, not WebSocket
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 15s;

    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer-when-downgrade always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=()" always;

        # ── Forwarded headers ─────────────────────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_read_timeout 60s;
        }

        # ── Socket.io (WebSocket upgrade) ─────────────────────────────────────
        location /socket.io/ {
            proxy_pass http://backend;

            # WebSocket upgrade headers — CRITICAL
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Keep long-lived connections alive
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            
            # Buffer settings for WebSocket
            proxy_buffering off;
            proxy_cache off;
        }

        # ── Health endpoints ──────────────────────────────────────────────────
        location /health/ {
            proxy_pass http://backend;
        }

        # ── Frontend (catch-all) ──────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_read_timeout 60s;
        }
    }
}
