# Development override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder  # Stop at builder stage for faster rebuilds
    volumes:
      # Mount source for hot reload (requires nodemon)
      - ./backend/src:/app/src:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    ports:
      - "5000:5000"  # Expose for direct access during dev
    command: npm run dev  # Override to use dev script with nodemon

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps  # Stop at deps stage
    volumes:
      # Mount source for hot reload
      - ./app:/app/app:ro
      - ./components:/app/components:ro
      - ./lib:/app/lib:ro
      - ./store:/app/store:ro
      - ./hooks:/app/hooks:ro
      - ./types:/app/types:ro
      - ./public:/app/public:ro
      - ./.env.local:/app/.env.local:ro
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"  # Expose for direct access during dev
    command: npm run dev

  mongodb:
    ports:
      - "27017:27017"  # Expose for direct access with MongoDB Compass

  nginx:
    # In dev, you might want to access services directly
    # Comment out nginx service or use it as-is
    ports:
      - "8080:80"  # Use different port to avoid conflicts
